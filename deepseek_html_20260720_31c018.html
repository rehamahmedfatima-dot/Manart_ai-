            --bg-card: #ffffff;
            --bg-card-hover: #f0f4f9;
            --bg-section: #edf2f7;
            --text-primary: #0b1a2e;
            --text-secondary: #2d3f54;
            --text-muted: #5e6f82;
            --border-color: #dce3ec;
            --shadow: 0 8px 24px rgba(0, 20, 40, 0.06);
            --shadow-hover: 0 16px 40px rgba(0, 20, 40, 0.12);

            --radius-sm: 12px;
            --transition: 0.3s cubic-bezier(0.2, 0, 0, 1);
            --accent: #2563eb;
            --accent-light: #3b82f6;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --free-badge: #16a34a;
            --free-bg: #dcfce7;
            --paid-badge: #dc2626;
            --paid-bg: #fee2e2;
            --header-bg: rgba(255, 255, 255, 0.82);
        }
        [data-theme="dark"] {
            --bg-primary: #0b1424;
            --bg-secondary: #111d2f;
            --bg-card: #172b3f;
            --bg-card-hover: #1e344c;
            --bg-section: #0f1d30;
            --text-primary: #eaf0f8;
            --text-secondary: #b6cbe0;
            --text-muted: #7e96b0;
            --border-color: #1e344c;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 16px 40px rgba(0, 0, 0, 0.5);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.2);
            --header-bg: rgba(11, 20, 36, 0.88);
            --free-badge: #4ade80;
            --free-bg: #1a3a2a;
            --paid-badge: #f87171;
            --paid-bg: #3f1f1f;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            line-height: 1.6;
            min-height: 100vh;
            padding: 0 20px 60px;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--header-bg);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            margin: 0 -20px 25px;
            padding-left: 20px;
            padding-right: 20px;
            transition: background var(--transition), border var(--transition);
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.4rem;
            font-weight: 800;
        }
        .logo i {
            color: #fbbf24; /* لون المصباح الذهبي */
        }
        .logo span {
            background: linear-gradient(135deg, #2563eb, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo .sub {
            font-weight: 400;
            font-size: 0.75rem;
            -webkit-text-fill-color: var(--text-muted);
            background: none;
            color: var(--text-muted);
            margin-right: 4px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition);
        }
        .theme-toggle:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }
        .stats-badge {
            background: var(--accent-glow);
            color: var(--accent);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .hero {
            text-align: center;
            padding: 20px 0 10px;
        }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 30%, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 1.05rem;
            max-width: 700px;
            margin: 6px auto 0;
        }
        .section-nav {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 6px 14px;
            margin: 20px 0 30px;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border-radius: 60px;
            border: 1px solid var(--border-color);
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .section-nav::-webkit-scrollbar {
            height: 4px;
        }
        .section-nav::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        .section-nav a {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 4px 14px;
            border-radius: 40px;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .section-nav a:hover,
        .section-nav a.active {
            color: var(--text-primary);
            background: var(--bg-card-hover);
        }
        .section-nav a i {
            font-size: 0.9rem;
        }
        .category {
            margin-bottom: 48px;
        }
        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
        }
        .category-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .category-title i {
            font-size: 1.5rem;
        }

            font-weight: 600;
            background: var(--bg-card-hover);
            color: var(--text-muted);
            padding: 2px 12px;
            border-radius: 40px;
        }
        .tier-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
        }

            padding: 5px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition);
        }

            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .tier-tab:hover:not(.active) {
            background: var(--bg-card-hover);
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
            margin-top: 12px;
        }
        .tool-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 18px 18px 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: fadeUp 0.4s ease both;
        }
        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
            background: var(--bg-card-hover);
        }
        .tool-card .tier-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 30px;
            text-transform: uppercase;

            background: var(--free-bg);
            color: var(--free-badge);
        }
        .tier-badge.paid {
            background: var(--paid-bg);
            color: var(--paid-badge);
        }

            height: 46px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 10px;
            background: var(--bg-section);
            color: var(--accent);
            flex-shrink: 0;

        .tool-card .tool-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 2px;

        .tool-card .tool-name a:hover {
            color: var(--accent);
        }
        .tool-card .tool-name .external {
            font-size: 0.6rem;
            color: var(--text-muted);
            opacity: 0.6;
            margin-right: 4px;
        }
        .tool-card .tool-desc {
            color: var(--text-muted);
            font-size: 0.82rem;
            margin: 4px 0 10px;
            flex: 1;
            line-height: 1.5;

            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: auto;

            color: var(--text-secondary);
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px dashed var(--border-color);
            grid-column: 1/-1;
        }
        .footer {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .footer a {
            color: var(--accent);
            font-weight: 600;
        }
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.6rem;
            }
            .section-nav {
                border-radius: 30px;
                padding: 8px 14px;
            }
            .category-title {
                font-size: 1.1rem;
            }
            .tool-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 12px;
            }
            .header-inner {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .logo {
                justify-content: center;
            }
            .header-actions {
                justify-content: center;
            }
            .tier-tabs {
                width: 100%;
                justify-content: center;
            }
            .tier-tab {
                flex: 1;
                text-align: center;
                padding: 4px 8px;
                font-size: 0.7rem;
            }
            .category-header {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 0 10px 40px;
            }
            .header {
                margin: 0 -10px 15px;
                padding-left: 10px;
                padding-right: 10px;
            }
            .tool-grid {
                grid-template-columns: 1fr;
            }
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

                { name: 'ParseHub', desc: 'أداة استخراج بيانات مرنة.', tier: 'free', icon: 'fa-solid fa-code',
                    tags: ['استخراج', 'مرنة'], url: 'https://www.parsehub.com/' },
                { name: 'Webscraper.io', desc: 'استخراج بيانات عبر المتصفح.', tier: 'free',
                    icon: 'fa-solid fa-globe', tags: ['استخراج', 'متصفح'], url: 'https://webscraper.io/' },
                { name: 'ScrapingBee', desc: 'استخراج بيانات مع تجنب الحظر.', tier: 'paid', icon: 'fa-solid fa-bee',
                    tags: ['استخراج', 'حظر'], url: 'https://www.scrapingbee.com/' },
                { name: 'Apify', desc: 'منصة استخراج بيانات وأتمتة.', tier: 'free', icon: 'fa-solid fa-api',
                    tags: ['استخراج', 'أتمتة'], url: 'https://apify.com/' },
                { name: 'Diffbot', desc: 'استخراج بيانات معرفية من الويب.', tier: 'paid', icon: 'fa-solid fa-robot',
                    tags: ['معرفية', 'ويب'], url: 'https://www.diffbot.com/' }
            ]
        }];

        // ================================================================
        //  RENDER ENGINE
        // ================================================================
        const container = document.getElementById('sectionsContainer');
        const navContainer = document.getElementById('sectionNav');
        let totalTools = 0;

        function renderAll() {
            navContainer.innerHTML = categories.map(cat =>
                `<a href="#${cat.id}" data-cat="${cat.id}"><i class="${cat.icon}"></i> ${cat.name}</a>`
            ).join('');

            container.innerHTML = categories.map((cat, idx) => {
                const toolsHtml = cat.tools.map((tool, tIdx) => `
                        <div class="tool-card" style="animation-delay:${(tIdx * 0.01)}s">
                            <span class="tier-badge ${tool.tier}">${tool.tier === 'free' ? 'مجاني' : 'غير مجاني'}</span>
                            <div class="tool-icon"><i class="${tool.icon}"></i></div>
                            <div class="tool-name">
                                <a href="${tool.url}" target="_blank" rel="noopener">${tool.name}</a>
                                <span class="external"><i class="fas fa-up-right-from-square"></i></span>
                            </div>
                            <div class="tool-desc">${tool.desc}</div>
                            <div class="tool-tags">${tool.tags.map(t => `<span>#${t}</span>`).join('')}</div>
                        </div>
                    `).join('');

                const gridContent = cat.tools.length ? `<div class="tool-grid">${toolsHtml}</div>` :
                    `<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد أدوات في هذا القسم</p></div>`;

                return `
                        <section class="category" id="${cat.id}">
                            <div class="category-header">
                                <div class="category-title">
                                    <i class="${cat.icon}"></i> ${cat.name}
                                    <span class="badge-count">${cat.tools.length}</span>
                                </div>
                                <div class="tier-tabs" data-category="${cat.id}">
                                    <button class="tier-tab active" data-tier="all">الكل</button>
                                    <button class="tier-tab" data-tier="free">مجاني</button>
                                    <button class="tier-tab" data-tier="paid">غير مجاني</button>
                                </div>
                            </div>
                            <div class="tool-grid-wrap" id="gridWrap_${cat.id}">${gridContent}</div>
                        </section>
                    `;
            }).join('');

            document.querySelectorAll('.tier-tabs').forEach(tabs => {
                const catId = tabs.dataset.category;
                tabs.querySelectorAll('.tier-tab').forEach(tab => {
                    tab.addEventListener('click', function() {
                        tabs.querySelectorAll('.tier-tab').forEach(t => t.classList.remove('active'));
                        this.classList.add('active');
                        const tier = this.dataset.tier;
                        filterCategory(catId, tier);
                    });
                });
            });

            totalTools = categories.reduce((acc, c) => acc + c.tools.length, 0);
            document.getElementById('toolCount').textContent = totalTools;

            navContainer.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.dataset.cat;
                    const targetEl = document.getElementById(targetId);
                    if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    navContainer.querySelectorAll('a').forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            setTimeout(() => {
                const sectionEls = categories.map(c => document.getElementById(c.id)).filter(Boolean);
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const id = entry.target.id;
                            navContainer.querySelectorAll('a').forEach(link => {
                                link.classList.toggle('active', link.dataset.cat === id);
                            });
                        }
                    });
                }, { threshold: 0.3 });
                sectionEls.forEach(s => observer.observe(s));
            }, 100);
        }

        function filterCategory(catId, tier) {
            const cat = categories.find(c => c.id === catId);
            if (!cat) return;
            const wrap = document.getElementById(`gridWrap_${catId}`);
            if (!wrap) return;

            const filtered = tier === 'all' ? cat.tools : cat.tools.filter(t => t.tier === tier);
            if (filtered.length === 0) {
                wrap.innerHTML =
                    `<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد أدوات ${tier === 'free' ? 'مجانية' : 'غير مجانية'} في هذا القسم</p></div>`;
                return;
            }
            const toolsHtml = filtered.map((tool, tIdx) => `
                    <div class="tool-card" style="animation-delay:${(tIdx * 0.01)}s">
                        <span class="tier-badge ${tool.tier}">${tool.tier === 'free' ? 'مجاني' : 'غير مجاني'}</span>
                        <div class="tool-icon"><i class="${tool.icon}"></i></div>
                        <div class="tool-name">
                            <a href="${tool.url}" target="_blank" rel="noopener">${tool.name}</a>
                            <span class="external"><i class="fas fa-up-right-from-square"></i></span>
                        </div>
                        <div class="tool-desc">${tool.desc}</div>
                        <div class="tool-tags">${tool.tags.map(t => `<span>#${t}</span>`).join('')}</div>
                    </div>
                `).join('');
            wrap.innerHTML = `<div class="tool-grid">${toolsHtml}</div>`;
        }

        // ================================================================
        //  THEME TOGGLE
        // ================================================================
        const themeToggle = document.getElementById('themeToggle');
        const themeLabel = document.getElementById('themeLabel');
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeUI(currentTheme);

        themeToggle.addEventListener('click', function() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeUI(next);
        });

        function updateThemeUI(theme) {
            const icon = themeToggle.querySelector('i');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
                themeLabel.textContent = 'فاتح';
            } else {
                icon.className = 'fas fa-moon';
                themeLabel.textContent = 'داكن';
            }
        }

        // ================================================================
        //  INIT
        // ================================================================
        renderAll();
        console.log(`🏛️ منارة الذكاء | Manarat AI · تم تحميل ${totalTools} أداة في ${categories.length} قسماً`);
    </script>
</body>
</html>
